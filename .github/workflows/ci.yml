name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "design/**"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Style lint
        run: npm run lint:style

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: E2E tests
        run: npm run test:e2e
